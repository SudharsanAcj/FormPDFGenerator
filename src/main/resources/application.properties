# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/form-pdf-generator
spring.application.name=form-pdf-generator

# ── Jackson ───────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null

# ── PDF ───────────────────────────────────────────────────────────────────────
pdf.forms.base-path=classpath:forms
pdf.amc-mappings.pattern=classpath:amc-mappings/*.yaml
pdf.temp-dir=/tmp/form-pdf-generator

# ── Aadhaar eSign Gateway (CDAC eSign 2.1) ───────────────────────────────────
esign.gateway.url=https://esigntest.cdac.in/esign2.1/esign
esign.gateway.response-url=https://your-domain.com/form-pdf-generator/api/v1/esign/callback
esign.gateway.version=2.1
esign.gateway.cert-path=classpath:certs/cdac-esign-gateway.cer
esign.gateway.timeout-seconds=30

# ASP credentials — override via environment variables in production
esign.asp.id=YOUR_ASP_ID
esign.asp.keystore-path=/etc/secrets/asp-keystore.p12
esign.asp.keystore-password=${ASP_KEYSTORE_PASSWORD:changeit}
esign.asp.key-alias=asp-signing-key
# 1=OTP, 2=Biometric, 3=Iris
esign.asp.auth-mode=1

# ── RTI Endpoints per AMC ─────────────────────────────────────────────────────
# BLACKROCK (served by CAMS)
rti.endpoints.BLACKROCK.url=https://api.camsonline.com/v1/dsp-blackrock/fresh-purchase
rti.endpoints.BLACKROCK.auth-type=API_KEY
rti.endpoints.BLACKROCK.api-key=${RTI_BLACKROCK_API_KEY:dummy-key}

# HDFC (served by KFintech)
rti.endpoints.HDFC.url=https://rti.kfintech.com/v1/hdfc/fresh-purchase
rti.endpoints.HDFC.auth-type=OAUTH2
rti.endpoints.HDFC.oauth2.token-url=https://rti.kfintech.com/oauth/token
rti.endpoints.HDFC.oauth2.client-id=${RTI_HDFC_CLIENT_ID:dummy-client}
rti.endpoints.HDFC.oauth2.client-secret=${RTI_HDFC_CLIENT_SECRET:dummy-secret}
rti.endpoints.HDFC.oauth2.scope=rti:submit

# SBI (served by CAMS)
rti.endpoints.SBI.url=https://api.camsonline.com/v1/sbi/fresh-purchase
rti.endpoints.SBI.auth-type=API_KEY
rti.endpoints.SBI.api-key=${RTI_SBI_API_KEY:dummy-key}

# ICICI (served by KFintech)
rti.endpoints.ICICI.url=https://rti.kfintech.com/v1/icici/fresh-purchase
rti.endpoints.ICICI.auth-type=OAUTH2
rti.endpoints.ICICI.oauth2.token-url=https://rti.kfintech.com/oauth/token
rti.endpoints.ICICI.oauth2.client-id=${RTI_ICICI_CLIENT_ID:dummy-client}
rti.endpoints.ICICI.oauth2.client-secret=${RTI_ICICI_CLIENT_SECRET:dummy-secret}
rti.endpoints.ICICI.oauth2.scope=rti:submit

# RTI submission retry / timeout settings
rti.submission.timeout-seconds=45
rti.submission.max-retries=3
rti.submission.retry-delay-ms=2000

# ── Resilience4j ──────────────────────────────────────────────────────────────
resilience4j.circuitbreaker.instances.esignGateway.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.esignGateway.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.esignGateway.sliding-window-size=10
resilience4j.circuitbreaker.instances.esignGateway.permitted-number-of-calls-in-half-open-state=3

resilience4j.circuitbreaker.instances.rtiSubmission.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.rtiSubmission.wait-duration-in-open-state=60s
resilience4j.circuitbreaker.instances.rtiSubmission.sliding-window-size=10

resilience4j.retry.instances.rtiSubmission.max-attempts=3
resilience4j.retry.instances.rtiSubmission.wait-duration=2s
resilience4j.retry.instances.rtiSubmission.retry-exceptions=com.formgenerator.exception.RtiSubmissionException

# ── Actuator / Observability ──────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=${spring.application.name}
info.app.version=1.0.0

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.formgenerator=INFO
logging.level.org.apache.pdfbox=WARN
logging.level.org.springframework.web=WARN
