# ── Dev overrides ─────────────────────────────────────────────────────────────
logging.level.com.formgenerator=DEBUG
logging.level.org.springframework.web.reactive.function.client=DEBUG

# Use mock eSign gateway URL for local development
esign.gateway.url=http://localhost:9090/mock-esign
esign.gateway.response-url=http://localhost:8080/form-pdf-generator/api/v1/esign/callback

# Dev keystore (generate with: keytool -genkeypair -keystore dev-keystore.p12 -alias asp-signing-key -keyalg RSA -keysize 2048 -storetype PKCS12 -storepass changeit)
esign.asp.id=DEV_ASP_001
esign.asp.keystore-path=src/main/resources/dev/dev-keystore.p12
esign.asp.keystore-password=changeit
esign.asp.key-alias=asp-signing-key
