# ── Production overrides ──────────────────────────────────────────────────────
logging.level.com.formgenerator=WARN
server.error.include-message=never
server.error.include-stacktrace=never

# Production eSign gateway (live CDAC endpoint)
esign.gateway.url=https://esign.cdac.in/esign2.1/esign

# In production, all secrets come from environment variables or a vault
esign.asp.keystore-password=${ASP_KEYSTORE_PASSWORD}
rti.endpoints.BLACKROCK.api-key=${RTI_BLACKROCK_API_KEY}
rti.endpoints.HDFC.oauth2.client-id=${RTI_HDFC_CLIENT_ID}
rti.endpoints.HDFC.oauth2.client-secret=${RTI_HDFC_CLIENT_SECRET}
