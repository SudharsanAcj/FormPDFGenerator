# Suppress eSign and RTI actual calls during tests
esign.gateway.url=http://localhost:9999/mock-esign
esign.gateway.response-url=http://localhost:8080/form-pdf-generator/api/v1/esign/callback
esign.gateway.version=2.1
esign.gateway.timeout-seconds=5

esign.asp.id=TEST_ASP_ID
esign.asp.keystore-path=src/test/resources/dev/test-keystore.p12
esign.asp.keystore-password=changeit
esign.asp.key-alias=asp-signing-key
esign.asp.auth-mode=1

rti.endpoints.BLACKROCK.url=http://localhost:9999/mock-rti/blackrock
rti.endpoints.BLACKROCK.auth-type=API_KEY
rti.endpoints.BLACKROCK.api-key=test-key

rti.submission.timeout-seconds=5
rti.submission.max-retries=1
rti.submission.retry-delay-ms=100

resilience4j.circuitbreaker.instances.esignGateway.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.esignGateway.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.esignGateway.sliding-window-size=5

resilience4j.circuitbreaker.instances.rtiSubmission.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.rtiSubmission.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.rtiSubmission.sliding-window-size=5

resilience4j.retry.instances.rtiSubmission.max-attempts=1
resilience4j.retry.instances.rtiSubmission.wait-duration=100ms
